<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Academy</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <style>
        :root {
            --bg-obsidian: #000000;
            --bg-deep-card: #0a0a0c;
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.07);
            --neon-mtk: #00f2ff;
            --neon-ipa: #7000ff;
            --text-pure: #ffffff;
            --text-dim: #888888;
            --accent-green: #00ff88;
            --accent-red: #ff3e3e;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-obsidian);
            background-image: 
                radial-gradient(circle at 5% 5%, rgba(112, 0, 255, 0.1) 0%, transparent 30%),
                radial-gradient(circle at 95% 95%, rgba(0, 242, 255, 0.1) 0%, transparent 30%);
            color: var(--text-pure);
            margin: 0; padding: 0;
            min-height: 100vh;
        }

        .container { max-width: 850px; margin: 0 auto; padding: 20px; }

        header {
            text-align: center; padding: 50px 0;
            border-bottom: 1px solid var(--glass-border);
            margin-bottom: 30px;
        }

        .protocol-label {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.7rem; letter-spacing: 5px;
            color: var(--neon-mtk); text-transform: uppercase;
            margin-bottom: 10px; display: block;
        }

        .main-title {
            font-family: 'Montserrat', sans-serif; font-size: 3.5rem;
            margin: 0; line-height: 1; letter-spacing: -2px;
            background: linear-gradient(to bottom, #fff, #444);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .dashboard {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 15px; margin-bottom: 30px;
        }

        .stat-box {
            background: var(--bg-deep-card); border: 1px solid var(--glass-border);
            padding: 15px; border-radius: 15px; text-align: center;
        }

        .stat-val { font-family: 'Montserrat', sans-serif; font-size: 1.5rem; display: block; }
        .stat-label { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        .subject-selector { display: flex; gap: 10px; margin-bottom: 30px; }

        .sub-btn {
            flex: 1; padding: 18px; border-radius: 12px; border: 1px solid var(--glass-border);
            background: transparent; color: var(--text-dim); font-weight: 800;
            cursor: pointer; transition: 0.3s; font-family: 'Montserrat', sans-serif;
        }

        .sub-btn.active { border-color: var(--neon-mtk); color: var(--text-pure); background: rgba(0, 242, 255, 0.05); }

        .q-card {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            padding: 40px; border-radius: 25px; backdrop-filter: blur(15px);
            position: relative;
        }

        .q-meta { color: var(--text-dim); font-size: 0.75rem; margin-bottom: 20px; font-weight: 600; font-family: monospace; }
        .question-text { font-size: 1.25rem; line-height: 1.6; margin-bottom: 35px; color: #efefef; }

        .options-grid { display: grid; gap: 12px; }

        .opt {
            padding: 18px 25px; border-radius: 15px; border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.01); cursor: pointer; transition: 0.2s;
            font-size: 1rem;
        }

        .opt:hover { background: rgba(255,255,255,0.03); transform: translateX(8px); }
        .opt.correct { border-color: var(--accent-green) !important; background: rgba(0, 255, 136, 0.1) !important; color: var(--accent-green); }
        .opt.wrong { border-color: var(--accent-red) !important; background: rgba(255, 62, 62, 0.1) !important; color: var(--accent-red); }

        .explanation {
            margin-top: 25px; padding: 20px; border-radius: 15px;
            background: #0a0a0c; border-left: 4px solid var(--neon-mtk);
            display: none; font-size: 0.95rem; color: #ccc;
        }

        .nav-actions { margin-top: 30px; display: flex; gap: 15px; }
        .primary-btn {
            flex: 1; padding: 20px; border-radius: 50px; border: none;
            background: #fff; color: #000; font-weight: 900;
            cursor: pointer; text-transform: uppercase; font-size: 0.9rem;
        }

        .progress-bar { height: 4px; width: 0%; background: var(--neon-mtk); transition: 0.5s; margin-top: 40px; }

        footer { text-align: center; padding: 40px; color: #222; font-size: 0.7rem; font-weight: 800; }
    </style>
</head>

            { q: "Dua koin dilempar bersamaan. Peluang muncul dua-duanya kepala adalah...", opts: ["1/4", "1/2", "3/4", "1"], correct: "1/4", ex: "Sampel: {HH, HA, AH, AA}. HH ada 1 dari 4." },
            { q: "Peluang tidak muncul angka 1 pada pelemparan sebuah dadu adalah...", opts: ["5/6", "1/6", "1/2", "1"], correct: "5/6", ex: "Muncul angka {2, 3, 4, 5, 6}." },
            { q: "Ruang sampel pelemparan sebuah koin adalah...", opts: ["{A, G}", "{1, 2}", "{A, A}", "{G, G}"], correct: "{A, G}", ex: "Angka dan Gambar." },
            { q: "Nilai peluang maksimum dari suatu kejadian adalah...", opts: ["1", "10", "100", "Tidak hingga"], correct: "1", ex: "1 berarti kejadian tersebut pasti terjadi." },
            { q: "Nilai peluang minimum (kejadian mustahil) adalah...", opts: ["0", "-1", "0.5", "1"], correct: "0", ex: "0 berarti tidak mungkin terjadi." },
            { q: "Jika peluang hujan hari ini adalah 1/4, maka peluang tidak hujan adalah...", opts: ["3/4", "1/4", "1/2", "1"], correct: "3/4", ex: "1 - 1/4 = 3/4." },
            { q: "Sebuah dadu dilempar dua kali. Peluang muncul angka 6 pada kedua lemparan adalah...", opts: ["1/36", "1/12", "1/6", "2/6"], correct: "1/36", ex: "1/6 * 1/6 = 1/36." },
            { q: "Umur Andi 5 tahun lebih tua dari Budi. Jika umur Budi 10 tahun, berapa umur Andi?", opts: ["15 tahun", "5 tahun", "20 tahun", "10 tahun"], correct: "15 tahun", ex: "10 + 5 = 15." },
            { q: "Harga sebuah buku Rp5.000. Jika Andi membeli 3 buku, total harganya adalah...", opts: ["Rp15.000", "Rp10.000", "Rp8.000", "Rp5.300"], correct: "Rp15.000", ex: "3 x 5.000 = 15.000." },
            { q: "Jika $x + 7 = 15$, maka nilai x adalah...", opts: ["8", "7", "22", "15"], correct: "8", ex: "15 - 7 = 8." },
            { q: "Jika $3x = 21$, maka nilai x adalah...", opts: ["7", "3", "18", "63"], correct: "7", ex: "21 / 3 = 7." },
            { q: "Jika x = 2, maka nilai dari $4x + 3$ adalah...", opts: ["11", "9", "7", "10"], correct: "11", ex: "4(2) + 3 = 8 + 3 = 11." },
            { q: "Seorang membeli 2 pensil seharga Rp2.000 per buah. Total harga adalah...", opts: ["Rp4.000", "Rp2.000", "Rp6.000", "Rp2.200"], correct: "Rp4.000", ex: "2 x 2.000 = 4.000." },
            { q: "Bentuk $5(x + 2)$ secara distributif berarti...", opts: ["$5x + 10$", "$5x + 2$", "$x + 10$", "$10x$"], correct: "$5x + 10$", ex: "5 dikalikan x dan 5 dikalikan 2." },
            { q: "Bentuk sederhana dari $2x + 3x$ adalah...", opts: ["$5x$", "$6x$", "$5x^2$", "$x$"], correct: "$5x$", ex: "Koefisien dijumlahkan karena variabel sama." },
            { q: "Variabel dalam aljabar adalah...", opts: ["Lambang pengganti bilangan", "Angka tetap", "Operasi hitung", "Hasil akhir"], correct: "Lambang pengganti bilangan", ex: "Biasanya huruf seperti x, y, z." },
            { q: "Konstanta dalam aljabar adalah...", opts: ["Bilangan tetap/angka saja", "Huruf", "Tanda tambah", "Pangkat"], correct: "Bilangan tetap/angka saja", ex: "Nilainya tidak berubah (tidak memiliki variabel)." },
            { q: "Sebuah persegi memiliki sisi 5 cm. Luasnya adalah...", opts: ["25 $cm^2$", "20 $cm^2$", "10 $cm^2$", "50 $cm^2$"], correct: "25 $cm^2$", ex: "Sisi x Sisi = 25." },
            { q: "Keliling persegi dengan panjang sisi 4 cm adalah...", opts: ["16 cm", "8 cm", "4 cm", "12 cm"], correct: "16 cm", ex: "4 x Sisi = 16." },
            { q: "Volume kubus dengan panjang sisi 3 cm adalah...", opts: ["27 $cm^3$", "9 $cm^3$", "12 $cm^3$", "81 $cm^3$"], correct: "27 $cm^3$", ex: "Sisi x Sisi x Sisi = 27." },
            { q: "Tangga bersandar pada tembok membentuk segitiga siku-siku dengan alas 3 m dan tinggi 4 m. Panjang tangga adalah...", opts: ["5 m", "7 m", "12 m", "25 m"], correct: "5 m", ex: "$\sqrt{3^2 + 4^2} = 5$." },
            { q: "Rumus Pythagoras digunakan untuk menghitung sisi pada...", opts: ["Segitiga siku-siku", "Persegi", "Lingkaran", "Trapesium"], correct: "Segitiga siku-siku", ex: "Hanya berlaku pada segitiga siku-siku." },
            { q: "Luas persegi panjang dengan panjang 10 dan lebar 5 adalah...", opts: ["50", "30", "15", "100"], correct: "50", ex: "P x L = 50." },
            { q: "Volume balok dihitung dengan...", opts: ["p x l x t", "s x s x s", "$\pi r^2$", "a x t"], correct: "p x l x t", ex: "Panjang x Lebar x Tinggi." },
            { q: "Keliling lingkaran dengan jari-jari r adalah...", opts: ["$2 \pi r$", "$\pi r^2$", "$2 \pi$", "$\pi d^2$"], correct: "$2 \pi r$", ex: "Atau $\pi d$." },
            { q: "Jari-jari lingkaran adalah...", opts: ["Setengah diameter", "Dua kali diameter", "Sama dengan diameter", "Keliling"], correct: "Setengah diameter", ex: "r = d/2." },
            { q: "Diameter lingkaran adalah...", opts: ["2 kali jari-jari", "Setengah jari-jari", "Akar jari-jari", "Jarak pusat"], correct: "2 kali jari-jari", ex: "d = 2r." },
            { q: "Gradien garis yang miring ke kanan (naik) bernilai...", opts: ["Positif", "Negatif", "Nol", "Tak terhingga"], correct: "Positif", ex: "Nilai m > 0." },
            { q: "Gradien garis yang miring ke kiri (turun) bernilai...", opts: ["Negatif", "Positif", "Nol", "Satu"], correct: "Negatif", ex: "Nilai m < 0." },
            { q: "Dua garis dikatakan sejajar jika...", opts: ["Gradiennya sama", "Berpotongan", "Tegak lurus", "Hasil kali m = -1"], correct: "Gradiennya sama", ex: "$m_1 = m_2$." },
            { q: "Dua garis saling tegak lurus jika hasil kali gradiennya...", opts: ["-1", "1", "0", "Tak hingga"], correct: "-1", ex: "$m_1 \cdot m_2 = -1$." },
            { q: "Nilai dari $\sqrt{144}$ adalah...", opts: ["12", "11", "13", "14"], correct: "12", ex: "$12 \times 12 = 144$." },
            { q: "Hasil dari $10^2$ sama dengan...", opts: ["100", "20", "10", "200"], correct: "100", ex: "$10 \times 10$." },
            { q: "100 dibagi 10 adalah...", opts: ["10", "1", "100", "0"], correct: "10", ex: "Operasi pembagian dasar." },
            { q: "50% dari 200 adalah...", opts: ["100", "50", "150", "20"], correct: "100", ex: "Setengah dari 200." },
            { q: "Hasil dari $1/2 + 1/2$ adalah...", opts: ["1", "1/4", "1/2", "2"], correct: "1", ex: "Pecahan senilai." },
            { q: "Hasil dari $3^2 + 4^2$ adalah...", opts: ["25", "14", "49", "12"], correct: "25", ex: "9 + 16 = 25." }
        ]
    };

    let curSub = 'IPA';
    let curIdx = 0;
    let score = 0;
    let streak = 0;

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    const bgMusic = document.getElementById('bg-music');
    document.addEventListener('click', function() {
        if (bgMusic.paused) {
            bgMusic.play().catch(e => console.log("Audio play blocked"));
        }
    }, { once: false });

    function switchSubject(s) {
        curSub = s; curIdx = 0;
        document.getElementById('btn-ipa').classList.toggle('active', s === 'IPA');
        document.getElementById('btn-mtk').classList.toggle('active', s === 'MTK');
        shuffle(database[curSub]);
        render();
    }

    function render() {
        const item = database[curSub][curIdx];
        document.getElementById('q-id').innerText = `STORY_NODE // ${curSub}_S${curIdx + 1}`;
        document.getElementById('q-text').innerHTML = item.q;
        document.getElementById('progress-val').innerText = `${curIdx + 1}/50`;
        document.getElementById('p-bar').style.width = `${((curIdx + 1) / 50) * 100}%`;

        const shuffledOptions = shuffle([...item.opts]);
        const container = document.getElementById('q-options');
        container.innerHTML = '';
        
        shuffledOptions.forEach(opt => {
            const div = document.createElement('div');
            div.className = 'opt';
            div.innerHTML = opt;
            div.onclick = () => check(div, opt, item.correct);
            container.appendChild(div);
        });

        document.getElementById('q-explanation').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        if (window.MathJax) MathJax.typeset();
    }

    function check(el, sel, cor) {
        const all = document.querySelectorAll('.opt');
        all.forEach(o => o.style.pointerEvents = 'none');

        if(sel === cor) {
            el.classList.add('correct');
            score += 250; streak++;
        } else {
            el.classList.add('wrong');
            all.forEach(o => { if(o.innerHTML === cor) o.classList.add('correct'); });
            streak = 0;
        }

        document.getElementById('score-val').innerText = score;
        document.getElementById('streak-val').innerText = streak;
        const exp = document.getElementById('q-explanation');
        exp.innerHTML = `<strong>ANALISIS LOGIKA:</strong> ${database[curSub][curIdx].ex}`;
        exp.style.display = 'block';
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        if(curIdx < 49) { curIdx++; render(); }
        else { alert("MISI SELESAI. Semua protokol cerita telah dikuasai."); }
    }

    window.onload = () => {
        shuffle(database['IPA']);
        shuffle(database['MTK']);
        render();
    };
</script>
</body>
</html>
